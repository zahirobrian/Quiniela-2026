<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Quiniela Super Prime — Mundial 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --surface2:#22263a;
  --surface3:#2a2f45;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.15);
  --text:#f0f0f0;
  --text2:#a0a4b8;
  --text3:#5a5f78;
  --blue:#4e8ef7;
  --blue-dim:#1a2d5a;
  --green:#3ecf8e;
  --green-dim:#0d3d26;
  --red:#f87171;
  --red-dim:#3d0d0d;
  --gold:#f59e0b;
  --gold-dim:#3d2a05;
  --purple:#a78bfa;
  --purple-dim:#2d1f5a;
  --radius:12px;
  --radius-sm:8px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:680px;margin:0 auto;padding-bottom:5rem}

/* HEADER */
.header{background:linear-gradient(135deg,#1a1d27 0%,#0f1117 100%);border-bottom:1px solid var(--border);padding:1rem 1.25rem;position:sticky;top:0;z-index:20;backdrop-filter:blur(12px)}
.header-inner{display:flex;align-items:center;gap:12px}
.header-icon{font-size:28px;filter:drop-shadow(0 0 8px rgba(245,158,11,.4))}
.header-title{font-size:17px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px}
.header-status{margin-left:auto;font-size:11px;color:var(--text3);text-align:right;max-width:120px;line-height:1.3}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;gap:0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--text2)}

/* PANELS */
.panel{display:none;padding:1rem}
.panel.active{display:block}

/* PODIUM */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.pod{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem .5rem;text-align:center;transition:transform .2s}
.pod:hover{transform:translateY(-2px)}
.pod.gold{border-color:var(--gold);background:linear-gradient(135deg,var(--gold-dim),var(--surface))}
.pod.silver{border-color:#94a3b8;background:linear-gradient(135deg,rgba(148,163,184,.1),var(--surface))}
.pod.bronze{border-color:#cd7c4a;background:linear-gradient(135deg,rgba(205,124,74,.1),var(--surface))}
.pod-medal{font-size:24px;display:block;margin-bottom:4px}
.pod-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod-pts{font-size:26px;font-weight:800;color:var(--text)}
.pod-of{font-size:10px;color:var(--text3);margin-top:2px}

/* RANKING */
.search{width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;margin-bottom:.75rem;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--text3)}
.rank-table{width:100%;border-collapse:separate;border-spacing:0 4px}
.rank-row{background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;transition:background .15s}
.rank-row:hover{background:var(--surface2)}
.rank-row.me{background:var(--blue-dim);border:1px solid rgba(78,142,247,.2)}
.rank-row td{padding:10px 12px;font-size:13px}
.rank-row td:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm);width:32px;font-size:11px;color:var(--text3)}
.rank-row td:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.pts-pill{display:inline-block;background:var(--blue-dim);color:var(--blue);border-radius:100px;padding:3px 10px;font-size:12px;font-weight:700}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width .6s ease}
.pct{font-size:11px;color:var(--text3);min-width:32px;text-align:right}
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.last-upd{font-size:11px;color:var(--text3)}
.btn{font-size:12px;padding:6px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer;font-weight:500;transition:all .2s}
.btn:hover{background:var(--surface2);color:var(--text)}

/* PARTIDOS */
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem}
.filter-btn{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:100px;background:transparent;cursor:pointer;color:var(--text3);transition:all .2s}
.filter-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.group-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:10px 0 5px}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:6px;border-left:3px solid var(--border);transition:border-color .2s}
.match-card.played{border-left-color:var(--green)}
.match-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
.teams{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.sep{color:var(--text3);font-size:11px;font-weight:400}
.res-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;white-space:nowrap}
.res-1{background:var(--green-dim);color:var(--green)}
.res-x{background:var(--gold-dim);color:var(--gold)}
.res-2{background:var(--blue-dim);color:var(--blue)}
.res-none{background:var(--surface2);color:var(--text3)}
.pred-row{display:flex;gap:3px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 7px;border-radius:100px;border:1px solid var(--border);color:var(--text3);background:var(--surface2);font-weight:500}
.chip.hit{background:var(--green-dim);color:var(--green);border-color:rgba(62,207,142,.3)}
.chip.miss{background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,.3)}

/* PREDICCIONES */
.players-list{display:flex;flex-direction:column;gap:6px}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.player-card:hover{border-color:var(--border2)}
.player-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.player-name{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.player-rank{font-size:11px;background:var(--surface2);color:var(--text3);padding:2px 8px;border-radius:100px}
.player-score{display:flex;align-items:center;gap:8px}
.player-pts{font-size:15px;font-weight:700;color:var(--blue)}
.player-pct{font-size:11px;color:var(--text3)}
.chevron{font-size:12px;color:var(--text3);transition:transform .25s}
.player-card.open .chevron{transform:rotate(180deg)}
.player-preds{display:none;border-top:1px solid var(--border);padding:10px}
.player-card.open .player-preds{display:block}
.pred-group-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:6px 4px 3px}
.pred-match-row{display:flex;align-items:center;justify-content:space-between;padding:5px 4px;border-radius:6px;margin-bottom:2px}
.pred-match-row.hit{background:var(--green-dim)}
.pred-match-row.miss{background:var(--red-dim)}
.pred-match-row.pending{background:transparent}
.pred-match-name{font-size:12px;color:var(--text2)}
.pred-match-val{font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px}
.pred-val-1{background:rgba(62,207,142,.15);color:var(--green)}
.pred-val-x{background:rgba(245,158,11,.15);color:var(--gold)}
.pred-val-2{background:rgba(78,142,247,.15);color:var(--blue)}
.pred-result-icon{font-size:12px;margin-left:4px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:5px}
.stat-val{font-size:22px;font-weight:800;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin:1rem 0 .5rem;text-transform:uppercase;letter-spacing:.04em}

/* MISC */
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:9px 20px;border-radius:100px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* DUEL */
.duel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.duel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(135deg,var(--surface2),var(--surface))}
.duel-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.duel-players{display:flex;align-items:center;gap:8px}
.duel-name{font-size:14px;font-weight:800}
.duel-name.p1{color:var(--gold)}
.duel-name.p2{color:var(--purple)}
.duel-vs{font-size:11px;color:var(--text3);padding:0 4px}
.duel-scores{display:flex;align-items:center;gap:6px}
.duel-score{font-size:22px;font-weight:900;min-width:36px;text-align:center;padding:4px 10px;border-radius:8px}
.duel-score.p1{color:var(--gold);background:var(--gold-dim)}
.duel-score.p2{color:var(--purple);background:var(--purple-dim)}
.duel-sep{font-size:16px;color:var(--text3)}
.duel-body{padding:10px 12px}
.duel-match{display:flex;align-items:center;gap:6px;padding:5px 4px;border-radius:8px;margin-bottom:3px}
.duel-match.pending{opacity:.6}
.duel-match-name{font-size:12px;color:var(--text2);flex:1}
.duel-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.duel-dot.p1win{background:var(--gold-dim);color:var(--gold)}
.duel-dot.p2win{background:var(--purple-dim);color:var(--purple)}
.duel-dot.both{background:var(--green-dim);color:var(--green)}
.duel-dot.none{background:var(--surface2);color:var(--text3)}
.duel-preds{display:flex;gap:4px;align-items:center}
.duel-pred{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px}
.duel-pred.p1{background:var(--gold-dim);color:var(--gold)}
.duel-pred.p2{background:var(--purple-dim);color:var(--purple)}
.duel-legend{display:flex;gap:10px;padding:8px 12px;border-top:1px solid var(--border);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.legend-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.duel-tie{text-align:center;padding:8px;font-size:11px;color:var(--gold);font-weight:600;background:var(--gold-dim);border-radius:8px;margin-bottom:8px}
</style>
</head>

<div id="panel-partidos" class="panel">

function getOutcome(v){
  if(v===undefined||v===null||v==='') return null;
  const n=parseInt(v);
  if(n===1||n===2||n===3) return n;
  return null;
}

function calcScores(){
  const scores={}, details={};
  Object.keys(QUINIELAS).forEach(n=>{scores[n]=0;details[n]={};});
  MATCHES.forEach((m,i)=>{
    const a=getOutcome(results[m]);
    if(a===null) return;
    Object.keys(QUINIELAS).forEach(n=>{
      const hit=QUINIELAS[n][i]===a;
      if(hit) scores[n]++;
      details[n][m]=hit;
    });
  });
  return{scores,details};
}

function countPlayed(){return MATCHES.filter(m=>getOutcome(results[m])!==null).length;}

function predLabel(v){return v===1?'1':v===2?'X':v===3?'2':'?';}
function predClass(v){return v===1?'pred-val-1':v===2?'pred-val-x':'pred-val-2';}

function resLabel(actual,t1,t2){
  if(actual===1) return (NAMES[t1]||t1)+' gana';
  if(actual===2) return 'Empate';
  if(actual===3) return (NAMES[t2]||t2)+' gana';
  return 'Sin resultado';
}
function resCls(actual){return actual===1?'res-1':actual===2?'res-x':actual===3?'res-2':'res-none';}

function toggleDuel(){

function renderDuel(){
  const{scores}=calcScores();
  const played=countPlayed();
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const el=document.getElementById('duel-section');
  if(!el||sorted.length<2) return;

  // Puede haber empate en el primer lugar
  const topScore=sorted[0][1];
  const secondScore=sorted[1][1];
  const p1name=sorted[0][0];
  const p2name=sorted[1][0];
  const p1preds=QUINIELAS[p1name];
  const p2preds=QUINIELAS[p2name];

  // Partidos donde difieren
  const diffs=[];
  MATCHES.forEach((match,idx)=>{
    const pred1=p1preds[idx];
    const pred2=p2preds[idx];
    if(pred1===pred2) return; // iguales, no importan
    const actual=getOutcome(results[match]);
    const[t1,t2]=match.split('-');
    diffs.push({match,idx,pred1,pred2,actual,t1,t2});
  });

  // Puntos ganados en partidos clave (solo los que difieren)
  let p1key=0, p2key=0;
  diffs.forEach(({pred1,pred2,actual})=>{
    if(actual===null) return;
    if(pred1===actual) p1key++;
    if(pred2===actual) p2key++;
  });

  const pending=diffs.filter(d=>getOutcome(results[d.match])===null);
  const played2=diffs.filter(d=>getOutcome(results[d.match])!==null);

  const isTied=topScore===secondScore;

  const duelOpen = document.getElementById('duel-section')?.dataset.open === '1';
  let html=`<div class="duel-card">
    <div class="duel-header" onclick="toggleDuel()" style="cursor:pointer">
      <div>
        <p class="duel-title">⚔️ Duelo por el primer lugar</p>
        <div class="duel-players" style="margin-top:4px">
          <span class="duel-name p1">${p1name}</span>
          <span class="duel-vs">${isTied?'🤝 EMPATE':'vs'}</span>
          <span class="duel-name p2">${p2name}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">

          <p style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:4px">pts totales</p>
          <div class="duel-scores">
            <span class="duel-score p1">${topScore}</span>
            <span class="duel-sep">—</span>
            <span class="duel-score p2">${secondScore}</span>
          </div>
        </div>
        <span style="font-size:13px;color:var(--text3);transition:transform .25s;display:inline-block;transform:rotate(${duelOpen?'180':'0'}deg)">▼</span>
      </div>
    </div>
    <div class="duel-body" style="display:${duelOpen?'block':'none'}">
      ${isTied?`<div class="duel-tie">🤝 Empate en el primer lugar — los partidos pendientes decidirán al ganador</div>`:''}
      ${pending.length===0&&played2.length===0?'<p style="font-size:12px;color:var(--text3);text-align:center;padding:8px">No hay partidos donde difieran sus predicciones</p>':''}`;

  pending.sort((a,b)=>(MATCH_DATES[a.match]||'9999').localeCompare(MATCH_DATES[b.match]||'9999'));

  if(pending.length>0){
    html+=`<p style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">🔥 Partidos clave pendientes (${pending.length})</p>`;
    pending.forEach(({match,pred1,pred2,t1,t2})=>{
      const dStr=MATCH_DATES[match]?new Date(MATCH_DATES[match]+'T12:00:00').toLocaleDateString('es-MX',{month:'short',day:'numeric'}):'';
      html+=`<div class="duel-match pending">
        <span class="duel-match-name">${FLAGS[t1]||''} ${t1} vs ${t2} ${FLAGS[t2]||''} <span style="font-size:10px;color:var(--text3)">${dStr}</span></span>

          <span class="duel-pred p2" title="${p2name}">${predLabel(pred2)}</span>
        </div>
      </div>`;
    });
  }

  if(played2.length>0){
    html+=`<p style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 6px">Partidos clave jugados</p>`;
    played2.forEach(({match,pred1,pred2,actual,t1,t2})=>{

      let dotCls, dotIcon;
      if(hit1&&hit2){dotCls='both';dotIcon='=';}

      else if(hit2){dotCls='p2win';dotIcon='2';}
      else{dotCls='none';dotIcon='✗';}
      html+=`<div class="duel-match">
        <div class="duel-dot ${dotCls}">${dotIcon}</div>

function renderRanking(){

  ).join('');
  const maxPts=sorted[0]?.[1]||1;
  const filtered=sorted.filter(([n])=>!q||n.includes(q));
  document.getElementById('rank-body').innerHTML=filtered.map(([n,p])=>{
    const rank=sorted.findIndex(([x])=>x===n)+1;
    const pct=played>0?Math.round(p/played*100):0;
    const isMe=n===ME;
    return`<tr class="rank-row${isMe?' me':''}"><td>${rank}</td><td style="font-weight:${isMe?700:500}">${isMe?'👤 ':''}${n}</td><td><span class="pts-pill">${p} pts</span></td><td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(p/maxPts*100)}%"></div></div><span class="pct">${played>0?pct+'%':'-'}</span></div></td></tr>`;

}

function renderMatches(){

    ['all','A','B','C','D','E','F','G','H','I','J','K','L'].map(g=>
      `<button class="filter-btn${currentGroup===g?' active':''}" onclick="setGroup('${g}')">${g==='all'?'Todos':'Grupo '+g}</button>`
    ).join('');
  let html='',lastG='';
  toShow.forEach(match=>{
    const idx=MATCHES.indexOf(match);
    const g=MATCH_GROUP[match];
    const[t1,t2]=match.split('-');
    const actual=getOutcome(results[match]);
    const played=actual!==null;
    if(currentGroup==='all'&&g!==lastG){html+=`<p class="group-label">Grupo ${g}</p>`;lastG=g;}
    const chips=Object.entries(QUINIELAS).map(([name,preds])=>{
      const pred=preds[idx];
      const cls=played?(pred===actual?'hit':'miss'):'';
      return`<span class="chip ${cls}" title="${name}">${name.substring(0,4)} ${predLabel(pred)}</span>`;
    }).join('');
    html+=`<div class="match-card${played?' played':''}">
      <div class="match-head">
        <div class="teams">${FLAGS[t1]||''} ${t1}<span class="sep">vs</span>${t2} ${FLAGS[t2]||''}</div>
        <span class="res-badge ${resCls(actual)}">${resLabel(actual,t1,t2)}</span>
      </div>
      <div class="pred-row">${chips}</div>
    </div>`;
  });
  document.getElementById('matches-list').innerHTML=html||'<p class="empty">Sin partidos</p>';
}

        predsHTML+=`<div class="pred-match-row ${rowCls}">

    return`<div class="player-card${openPlayer===name?' open':''}" id="pc-${name}">

      <div class="player-preds">${predsHTML}</div>
    </div>`;
  }).join('');
}

    openPlayer=name;
  }
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const{scores}=calcScores();
  const played=countPlayed();
  const sv=Object.values(scores).sort((a,b)=>b-a);
  const max=sv[0]||0;
  const avg=sv.length?(sv.reduce((a,b)=>a+b,0)/sv.length).toFixed(1):0;
  const myScore=scores[ME]||0;
  const myRank=sv.filter(s=>s>myScore).length+1;
  const leader=Object.entries(scores).find(([,v])=>v===max)?.[0]||'-';
  document.getElementById('stats-grid').innerHTML=[
    {l:'Partidos jugados',v:`${played}`,s:`de ${MATCHES.length} totales`},
    {l:`Mi posición`,v:`#${myRank}`,s:`${myScore} puntos (${ME})`},
    {l:'Promedio del grupo',v:`${avg}`,s:'puntos por participante'},
    {l:'Líder actual',v:leader,s:`con ${max} puntos`},
  ].map(({l,v,s})=>`<div class="stat-card"><p class="stat-label">${l}</p><p class="stat-val">${v}</p><p class="stat-sub">${s}</p></div>`).join('');
  const hitMap={};
  MATCHES.forEach(m=>{
    const a=getOutcome(results[m]);
    if(a===null) return;
    const idx=MATCHES.indexOf(m);
    hitMap[m]=Object.values(QUINIELAS).filter(p=>p[idx]===a).length;
  });
  const played2=Object.entries(hitMap);
  const matchCard=([m,h])=>{
    const[t1,t2]=m.split('-');
    const a=getOutcome(results[m]);
    const winner=a===1?(NAMES[t1]||t1):a===2?'Empate':(NAMES[t2]||t2);
    return`<div class="match-card played" style="margin-bottom:6px"><div class="match-head"><span style="font-size:13px">${FLAGS[t1]||''} ${t1} vs ${t2} ${FLAGS[t2]||''}</span><span class="pts-pill">${h}/${Object.keys(QUINIELAS).length}</span></div><p style="font-size:11px;color:var(--text3);margin-top:4px">Resultado: ${winner}</p></div>`;
  };
  const top=[...played2].sort((a,b)=>b[1]-a[1]).slice(0,5);
  const bot=[...played2].sort((a,b)=>a[1]-b[1]).slice(0,5);
  document.getElementById('most-correct').innerHTML=top.length?top.map(matchCard).join(''):'<p class="empty">Sin resultados aún</p>';
  document.getElementById('least-correct').innerHTML=bot.length?bot.map(matchCard).join(''):'<p class="empty">Sin resultados aún</p>';
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function setGroup(g){currentGroup=g;renderMatches();}
function showTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='partidos') renderMatches();
  if(name==='predicciones') renderPredicciones();
  if(name==='stats') renderStats();
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
function updateStatus(){
  const p=countPlayed();
  document.getElementById('header-status').textContent=`${p}/${MATCHES.length} partidos`;
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSV(text){
  const rows=[];
  let col='',row=[],inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'&&text[i+1]==='"'){col+='"';i++;}
      else if(c==='"') inQ=false;
      else col+=c;
    } else {
      if(c==='"') inQ=true;
      else if(c===','){row.push(col.trim());col='';}
      else if(c==='\n'){row.push(col.trim());rows.push(row);row=[];col='';}
      else if(c!=='\r') col+=c;
    }
  }
  if(col||row.length){row.push(col.trim());rows.push(row);}
  return rows;
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function tryFetchAPI(){
  document.getElementById('header-status').textContent='↻ Cargando...';
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Resultados&cachebust=${Date.now()}`;
    const r=await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const text=await r.text();
    const rows=parseCSV(text);
    results={};
    let count=0;
    rows.forEach(cols=>{
      const match=(cols[0]||'').toUpperCase().trim();
      const raw=(cols[1]||'').toUpperCase().trim();
      if(!MATCHES.includes(match)||!raw) return;
      if(raw==='1') results[match]=1;
      else if(raw==='X'||raw==='3') results[match]=2;
      else if(raw==='2') results[match]=3;
      if(results[match]) count++;
    });
    toast(`✓ ${count} resultados cargados`);
    document.getElementById('last-upd').textContent=`Actualizado: ${new Date().toLocaleTimeString('es-MX')} · ${count} resultados`;
    renderAll();
  } catch(e){
    document.getElementById('header-status').textContent='Error: '+e.message;
    console.error(e);
  }
  updateStatus();
}

function renderAll(){renderRanking();renderDuel();updateStatus();}

renderAll();
tryFetchAPI();
setInterval(tryFetchAPI,5*60*1000);
</script>
